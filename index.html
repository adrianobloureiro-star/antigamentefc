<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Pelada FC</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <header>

        <div class="logo-container">

            <img src="logo.png" alt="Logo Pelada FC" class="logo">

        </div>


        <h1>⚽ ANTIGAMENTE FUTEBOL CLUBE</h1>

        <p>
            Sorteador Inteligente de Times
        </p>

    </header>

    <main>

        <!-- Cadastro -->

        <section class="card">

            <h2>Novo Jogador</h2>

            <input type="text" id="nome" placeholder="Nome do jogador">

            <select id="posicao">

                <option value="GOL">Goleiro</option>
                <option value="ZAG">Zagueiro</option>
                <option value="LAT">Lateral</option>
                <option value="VOL">Volante</option>
                <option value="MEI">Meia</option>
                <option value="ATA">Atacante</option>

            </select>

            <select id="nota">

                <option>1</option>
                <option>2</option>
                <option>3</option>
                <option>4</option>
                <option>5</option>
                <option>6</option>
                <option>7</option>
                <option>8</option>
                <option>9</option>
                <option selected>10</option>

            </select>

            <button id="btnAdicionar">

                ➕ Adicionar Jogador

            </button>

        </section>

        <!-- Pesquisa -->

        <section class="card">

            <input type="text" id="pesquisa" placeholder="Pesquisar jogador...">

        </section>

        <!-- Contadores -->

        <section class="card contadores">

            <div>

                <strong>Jogadores Linha</strong>

                <span id="contadorLinha">

                    0 / 20

                </span>

            </div>

            <div>

                <strong>Goleiros</strong>

                <span id="contadorGoleiros">

                    0

                </span>

            </div>

        </section>

        <!-- Lista -->

        <section class="card">

            <h2>Jogadores</h2>

            <div id="listaJogadores">

            </div>

        </section>

        <!-- Botões -->

        <section class="botoes">

            <button id="btnMarcarTodos">
                ☑ Marcar Todos
            </button>

            <button id="btnSortear">
                ⚽ Sortear Times
            </button>

            <button onclick="abrirGols()">
                🥅 Gols
            </button>

            <button id="btnLimparPresencas">
                🧹 Limpar
            </button>

            <button onclick="logout()">

                🚪 Sair

            </button>

            <button onclick="window.location.href='presenca.html'">
                ✅ Registrar Presença
            </button>

        </section>


        <!-- Resultado -->

        <section class="resultado" id="resultado">

        </section>

    </main>
    <!-- teste de login 

<script>
        if (!sessionStorage.getItem("usuario")) {
            window.location.href = "login.html";
        }
    </script>
    Botões -->


    <script src="config.js"></script>
    <script src="api.js"></script>
    <script src="sorteio.js"></script>
    <script src="app.js"></script>

    </footer>


</body>


</body>

</html>
